<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLCL Archive — Fixture Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <script src="site-layout.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#0066cc' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; }
        .cat-card { background-color: #090d16; }
    </style>
</head>
<body class="text-slate-300 font-sans antialiased">

    <!-- GLOBAL NAVIGATION CONTAINER -->
    <nav id="global-nav" class="border-b border-slate-900 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
        <!-- Injected automatically -->
    </nav>

    <script>
        fetch('components/nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('global-nav').innerHTML = data;
                // Fire a custom event to notify our page scripts that the nav bar is ready
                window.dispatchEvent(new Event('navLoaded'));
            })
            .catch(err => console.error('Error loading navigation header:', err));
    </script>

    <!-- HEADER -->
   <header class="max-w-[1400px] w-full mx-auto px-4 pt-10 pb-6 border-b border-slate-900 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
        <div>
            <span id="fixture-meta" class="text-[10px] font-mono font-bold text-brand-500 uppercase tracking-widest block">Fixture Overview</span>
            <h1 id="fixture-title" class="text-3xl font-black text-slate-100 tracking-tight uppercase mt-0.5">Loading Results...</h1>
            <p id="fixture-sub" class="text-xs font-medium text-slate-500 mt-1 uppercase tracking-wider">Calculating database field index...</p>
        </div>
        <div class="flex gap-4 font-mono text-center">
            <div class="bg-slate-950 border border-slate-900 p-3 rounded-xl min-w-[90px]">
                <span class="block text-[9px] font-bold text-slate-500 uppercase">Field Size</span>
                <span id="count-total" class="text-lg font-black text-slate-200">0</span>
            </div>
            <div class="bg-slate-950 border border-slate-900 p-3 rounded-xl min-w-[90px]">
                <span class="block text-[9px] font-bold text-slate-500 uppercase">Men</span>
                <span id="count-men" class="text-lg font-black text-sky-400">0</span>
            </div>
            <div class="bg-slate-950 border border-slate-900 p-3 rounded-xl min-w-[90px]">
                <span class="block text-[9px] font-bold text-slate-500 uppercase">Women</span>
                <span id="count-women" class="text-lg font-black text-pink-400">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] w-full mx-auto px-4 py-12 space-y-12 flex-grow">

        <!-- CATEGORY WINNERS GRID SECTION -->
        <section id="category-winners-section" class="space-y-4">
            <h2 class="text-xs font-black tracking-widest text-slate-500 uppercase">Age Category Winners</h2>
            <div id="category-winners-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                <!-- Dynamically populated with category cards -->
            </div>
        </section>

        <!-- HISTORICAL FIXTURE NOTES CONTAINER -->
        <section id="fixture-notes-container" class="hidden">
            <div class="border border-brand-500/20 bg-brand-500/5 rounded-xl p-4 flex gap-3 items-start">
                <span class="text-brand-500 font-mono font-bold text-sm select-none">ℹ️</span>
                <div class="space-y-1">
                    <h3 class="text-xs font-bold text-slate-200 uppercase tracking-wider">Historical Note</h3>
                    <p id="fixture-notes-text" class="text-xs text-slate-400 leading-relaxed"></p>
                </div>
            </div>
        </section>
        
        <!-- RESULTS MAIN CONTAINER (DYNAMIC SECTION TABLES INJECTED HERE) -->
        <section id="results-sections-container" class="space-y-10">
            <!-- Dynamically populated with single or multi-table standings -->
        </section>
    </main>

    <!-- RUNTIME SCRIPTER -->
    <script>
        // NAME FORMATTING HELPER FUNCTIONS
        function capitalizeWord(str) {
            return str ? str.charAt(0).toUpperCase() + str.slice(1).toLowerCase() : '';
        }

        function formatRunnerName(rawName) {
            if (!rawName) return '';
            const name = rawName.trim();

            // 1. Handle "SURNAME, Firstname" (e.g., "HUMPHRIES, Dave" -> "Dave Humphries")
            if (name.includes(',')) {
                const parts = name.split(',');
                const surname = parts[0].trim();
                const firstName = parts.slice(1).join(' ').trim();
                return `${capitalizeWord(firstName)} ${capitalizeWord(surname)}`;
            }

            // 2. Handle "SURNAME Firstname" with ALL-CAPS surname (e.g., "HUMPHRIES Dave" -> "Dave Humphries")
            const parts = name.split(/\s+/);
            if (parts.length >= 2 && parts[0] === parts[0].toUpperCase() && /[A-Z]{2,}/.test(parts[0])) {
                const surname = parts[0];
                const firstName = parts.slice(1).join(' ');
                
                const formattedFirstName = firstName.split(/\s+/).map(capitalizeWord).join(' ');
                const formattedSurname = capitalizeWord(surname);
                
                return `${formattedFirstName} ${formattedSurname}`;
            }

            return name;
        }

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawSeason = urlParams.get('season') || '2025_2026';
            const discipline = urlParams.get('discipline') || 'xc';
            const raceNum = parseInt(urlParams.get('race'), 10) || 1;

            const selectedSeason = rawSeason.replace('_', '/');
            
            // SAFE LINK UPDATE: Wait for asynchronous navbar load before manipulating its DOM properties
            window.addEventListener('navLoaded', () => {
                const navBack = document.getElementById('nav-back-link');
                if (navBack) {
                    navBack.removeAttribute('onclick'); 
                    navBack.href = `season.html?season=${rawSeason}&discipline=${discipline}`;
                    navBack.textContent = `← Back to Season Summary`;
                }
            });

            const allRecords = window.glclResults || [];
            
            // Filter matches both runner records and status placeholders (pos === 0)
            const allMatched = allRecords.filter(row => 
                row.season === selectedSeason && 
                row.discipline.toLowerCase() === discipline.toLowerCase() && 
                parseInt(row.race_number, 10) === raceNum
            );

            if (allMatched.length === 0) {
                document.getElementById('fixture-title').textContent = "No Records Found";
                return;
            }

            const meta = allMatched[0];
            document.getElementById('fixture-title').textContent = meta.venue;
            document.getElementById('fixture-meta').textContent = `Fixture ${raceNum} — GLCL ${discipline.toUpperCase()}`;
            document.getElementById('fixture-sub').textContent = `${meta.date} • Course Distance: ${meta.distance || 'N/A'}`;

            const resultsContainer = document.getElementById('results-sections-container');
            const winnersSection = document.getElementById('category-winners-section');
            const notesContainer = document.getElementById('fixture-notes-container');
            const notesText = document.getElementById('fixture-notes-text');

            // Render Historical Notes if available
            if (meta.notes && meta.notes.trim() !== '') {
                notesText.textContent = meta.notes;
                notesContainer.classList.remove('hidden');
            } else {
                notesContainer.classList.add('hidden');
            }

            // Handle Missing Results State
            if (meta.status === 'Results Missing') {
                if (winnersSection) winnersSection.style.display = 'none';
                resultsContainer.innerHTML = `
                    <div class="border border-amber-500/20 bg-amber-500/5 rounded-xl p-8 text-center space-y-2">
                        <h3 class="text-lg font-bold text-amber-400">Results Missing</h3>
                        <p class="text-xs text-slate-400 max-w-md mx-auto">
                            The results for this fixture are currently missing from the archive documentation.
                        </p>
                    </div>
                `;
                return;
            }

            // Handle Cancelled State
            if (meta.status === 'Cancelled') {
                if (winnersSection) winnersSection.style.display = 'none';
                resultsContainer.innerHTML = `
                    <div class="border border-red-500/20 bg-red-500/5 rounded-xl p-8 text-center space-y-2">
                        <h3 class="text-lg font-bold text-red-400">Fixture Cancelled</h3>
                        <p class="text-xs text-slate-400 max-w-md mx-auto">
                            This fixture was cancelled and no race took place.
                        </p>
                    </div>
                `;
                return;
            }

            // Filter for valid finisher rows
            const filtered = allMatched.filter(row => row.pos > 0).sort((a, b) => a.pos - b.pos);

            // Totals
            const menCount = filtered.filter(r => r.sex === 'M').length;
            const womenCount = filtered.filter(r => r.sex === 'F').length;
            document.getElementById('count-total').textContent = filtered.length;
            document.getElementById('count-men').textContent = menCount;
            document.getElementById('count-women').textContent = womenCount;

            // Compute Age Category Winners (tracking athlete objects to preserve club details)
            const targetedCategories = ['SENIOR', 'V35', 'V40', 'V45', 'V50', 'V55', 'V60', 'V65', 'V70', 'V75+'];
            const catWinnersMap = {};
            
            targetedCategories.forEach(cat => {
                catWinnersMap[cat] = { M: null, F: null };
            });

            filtered.forEach(row => {
                if (!row.age_cat || parseInt(row.cat_pos, 10) !== 1) return;
                
                let normCat = row.age_cat.toUpperCase().trim();

                // Map V18 / SEN / SENIOR to the SENIOR grid card
                if (normCat === 'V18' || normCat === 'SEN' || normCat === 'SENIOR') {
                    normCat = 'SENIOR';
                }

                // Group older veteran categories into V75+
                if (normCat.startsWith('V75') || normCat.startsWith('V80') || normCat.startsWith('V85')) {
                    normCat = 'V75+';
                }

                if (catWinnersMap[normCat]) {
                    const sexKey = row.sex.toUpperCase();
                    if (!catWinnersMap[normCat][sexKey]) {
                        catWinnersMap[normCat][sexKey] = { name: row.name, club: row.club };
                    }
                }
            });

            // Render Category Cards Grid
            const winnersGrid = document.getElementById('category-winners-grid');
            winnersGrid.innerHTML = '';

            targetedCategories.forEach(cat => {
                const maleWinnerObj = catWinnersMap[cat].M;
                const femaleWinnerObj = catWinnersMap[cat].F;

                const maleFormattedName = maleWinnerObj ? formatRunnerName(maleWinnerObj.name) : '';
                const femaleFormattedName = femaleWinnerObj ? formatRunnerName(femaleWinnerObj.name) : '';

                const maleWinnerHtml = maleWinnerObj 
                    ? `<a href="athlete.html?name=${encodeURIComponent(maleFormattedName)}&club=${encodeURIComponent(maleWinnerObj.club)}" class="hover:text-brand-500 transition-colors">${maleFormattedName}</a>` 
                    : '<span class="text-slate-600 font-normal">N/A</span>';

                const femaleWinnerHtml = femaleWinnerObj 
                    ? `<a href="athlete.html?name=${encodeURIComponent(femaleFormattedName)}&club=${encodeURIComponent(femaleWinnerObj.club)}" class="hover:text-brand-500 transition-colors">${femaleFormattedName}</a>` 
                    : '<span class="text-slate-600 font-normal">N/A</span>';

                const cardHtml = `
                    <div class="cat-card p-4 rounded-xl border border-slate-800 flex flex-col justify-between shadow-md">
                        <h4 class="text-xs font-black text-brand-500 uppercase tracking-widest border-b border-slate-800 pb-1.5 mb-2">
                            ${cat}
                        </h4>
                        <div class="space-y-1.5 text-[11px]">
                            <div class="flex justify-between items-center">
                                <span class="font-mono text-slate-500 font-bold uppercase">M</span>
                                <span class="font-bold text-slate-200 truncate max-w-[120px] text-right" title="${maleFormattedName || 'N/A'}">
                                    ${maleWinnerHtml}
                                </span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-mono text-slate-500 font-bold uppercase">F</span>
                                <span class="font-bold text-slate-200 truncate max-w-[120px] text-right" title="${femaleFormattedName || 'N/A'}">
                                    ${femaleWinnerHtml}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                winnersGrid.insertAdjacentHTML('beforeend', cardHtml);
            });

            // --- MULTI-SECTION DYNAMIC TABLE RENDERING ---
            
            // Group records by race_section
            const sectionsMap = {};
            filtered.forEach(row => {
                const secName = row.race_section || "Main";
                if (!sectionsMap[secName]) {
                    sectionsMap[secName] = [];
                }
                sectionsMap[secName].push(row);
            });

            resultsContainer.innerHTML = '';

            const sectionNames = Object.keys(sectionsMap);

            sectionNames.forEach(secName => {
                const sectionRows = sectionsMap[secName];
                const sectionTitle = (sectionNames.length === 1 && secName === "Main") 
                    ? "Full Field Standings" 
                    : `${secName} Standings`;

                // Helper function to build row HTML
                const buildRowsHtml = (rows) => {
                    return rows.map(row => {
                        const sexColor = row.sex === 'M' ? 'text-sky-400' : 'text-pink-400';
                        const podiumRowBg = row.pos <= 3 ? 'bg-brand-500/5 font-semibold text-slate-100' : 'hover:bg-slate-900/10';
                        
                        const catPosNum = parseInt(row.cat_pos, 10);
                        let catPosHtml = `<span class="text-slate-400">Pos ${row.cat_pos}</span>`;
                        
                        if (catPosNum === 1) {
                            catPosHtml = `<span class="inline-block font-mono font-bold text-[10px] text-amber-400 bg-amber-400/10 border border-amber-500/20 px-1.5 py-0.5 rounded">🥇 Pos 1</span>`;
                        } else if (catPosNum === 2) {
                            catPosHtml = `<span class="inline-block font-mono font-bold text-[10px] text-slate-300 bg-slate-300/10 border border-slate-400/20 px-1.5 py-0.5 rounded">🥈 Pos 2</span>`;
                        } else if (catPosNum === 3) {
                            catPosHtml = `<span class="inline-block font-mono font-bold text-[10px] text-amber-600 bg-amber-600/10 border border-amber-700/20 px-1.5 py-0.5 rounded">🥉 Pos 3</span>`;
                        }

                        const formattedName = formatRunnerName(row.name);
                        const athleteUrl = `athlete.html?name=${encodeURIComponent(formattedName)}&club=${encodeURIComponent(row.club)}`;

                        return `
                            <tr class="transition-colors ${podiumRowBg}">
                                <td class="py-3 px-4 text-center font-mono font-bold text-slate-400">${row.pos}</td>
                                <td class="py-3 px-4 text-center font-mono text-slate-500">${row.bib || '-'}</td>
                                <td class="py-3 px-4 font-bold text-slate-200">
                                    <a href="${athleteUrl}" class="hover:text-brand-500 transition-colors">${formattedName}</a>
                                </td>
                                <td class="py-3 px-4 text-center font-black ${sexColor}">${row.sex}</td>
                                <td class="py-3 px-4 uppercase tracking-tight text-slate-400 font-medium">${row.age_cat || 'SEN'}</td>
                                <td class="py-3 px-4 font-medium"><a href="club.html?name=${encodeURIComponent(row.club)}" class="hover:text-brand-500 transition-colors">${row.club}</a></td>
                                <td class="py-2 px-4 text-center">${catPosHtml}</td>
                                <td class="py-3 px-4 text-center font-mono text-slate-400">Pos ${row.gender_pos}</td>
                                <td class="py-3 px-4 text-right font-mono font-bold pr-6 text-brand-500">${row.time}</td>
                            </tr>
                        `;
                    }).join('');
                };

                const sectionBlockHtml = `
                    <div class="space-y-4">
                        <h2 class="text-xs font-black tracking-widest text-slate-500 uppercase">${sectionTitle}</h2>
                        <div class="border border-slate-900 bg-slate-950 rounded-xl overflow-hidden shadow-2xl">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse text-xs">
                                    <thead>
                                        <tr class="border-b border-slate-900 font-black uppercase tracking-wider text-slate-500 bg-slate-900/40 text-[10px]">
                                            <th class="py-3 px-4 w-16 text-center">Pos</th>
                                            <th class="py-3 px-4 w-16 text-center">Bib</th>
                                            <th class="py-3 px-4">Athlete Name</th>
                                            <th class="py-3 px-4 w-16 text-center">Sex</th>
                                            <th class="py-3 px-4">Age Category</th>
                                            <th class="py-3 px-4">Club</th>
                                            <th class="py-3 px-4 text-center w-24">Cat Pos</th>
                                            <th class="py-3 px-4 text-center w-24">Gender Pos</th>
                                            <th class="py-3 px-4 text-right pr-6 w-24">Time</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-900/40 text-slate-300">
                                        ${buildRowsHtml(sectionRows)}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;

                resultsContainer.insertAdjacentHTML('beforeend', sectionBlockHtml);
            });
        });
    </script>
    <div id="global-footer"></div>
</body>
</html>
