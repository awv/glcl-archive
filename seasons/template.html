<!DOCTYPE html>
<html lang="en-GB" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ season_title }} | GLCL Archive</title>
    
    <!-- Forces all relative links, scripts, and images to resolve from the site root -->
    <base href="/">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <script src="site-layout.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#0066cc',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(3,7,18,0.4) 0%, rgba(3,7,18,1) 100%);
        }
        .stat-card { background-color: #090d16; }
    </style>
</head>
<body class="text-slate-300 font-sans antialiased flex flex-col min-h-full">

    <!-- GLOBAL NAVIGATION CONTAINER -->
    <nav id="global-nav" class="border-b border-slate-900 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
        <!-- Injected automatically via script below -->
    </nav>
    <script>
    fetch('components/nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('global-nav').innerHTML = data;
        })
        .catch(err => console.error('Error loading navigation header:', err));
    </script>

    <!-- HERO SECTION WITH FEATURED SEASON PHOTO -->
    <header class="relative h-[45vh] flex items-end overflow-hidden border-b border-slate-900 w-full">
        <img src="assets/images/seasons/{{ season_slug }}/banner.jpg" alt="{{ season_title }}" class="absolute inset-0 w-full h-full object-cover object-center transform scale-105 filter brightness-75 contrast-110">
        <div class="absolute inset-0 hero-gradient"></div>
        
        <div class="relative max-w-[1400px] mx-auto px-4 w-full z-10 pb-12">
            <div class="flex items-center space-x-3 mb-4">
                <div class="bg-brand-500 text-white font-black p-2 rounded-lg text-sm tracking-tighter">GLCL</div>
                <span class="text-xs font-mono tracking-widest text-slate-400 uppercase">Season Campaign</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-100 tracking-tight uppercase max-w-3xl">
                {{ season_title }}
            </h1>
        </div>
    </header>

    <!-- OVERVIEW STATS MODULE -->
    <section class="max-w-[1400px] mx-auto px-4 w-full -mt-8 relative z-20">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="stat-card p-6 rounded-xl border border-slate-800 shadow-xl">
                <span class="text-[10px] font-mono font-bold tracking-widest text-slate-500 uppercase">Total Runners</span>
                <span class="block text-2xl font-black text-slate-100 mt-1">{{ total_runners }}</span>
            </div>
            <div class="stat-card p-6 rounded-xl border border-slate-800 shadow-xl">
                <span class="text-[10px] font-mono font-bold tracking-widest text-slate-500 uppercase">Fixtures Completed</span>
                <span class="block text-2xl font-black text-slate-100 mt-1">{{ completed_fixtures }} / {{ total_fixtures }}</span>
            </div>
            <div class="stat-card p-6 rounded-xl border border-slate-800 shadow-xl">
                <span class="text-[10px] font-mono font-bold tracking-widest text-slate-500 uppercase">League Leaders</span>
                <span class="block text-2xl font-black text-brand-500 mt-1">{{ league_leaders }}</span>
            </div>
        </div>
    </section>

    <!-- MAIN CONTENT MODULE CONTAINER -->
    <main class="max-w-[1400px] mx-auto px-4 py-12 space-y-16 w-full flex-grow">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
            
            <!-- FIXTURES COLUMN -->
            <section class="space-y-4">
                <div class="border-b border-slate-900 pb-2">
                    <h2 class="text-xl font-black text-slate-100 uppercase tracking-tight">Fixtures</h2>
                </div>
                <ul class="divide-y divide-slate-900">
                    <li class="py-4 flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-slate-200">Date Placeholder</span>
                            <span class="text-xs text-slate-500 font-medium mt-0.5">Location Placeholder</span>
                        </div>
                        <span class="text-[10px] font-mono font-bold tracking-wider text-slate-400 bg-slate-900 border border-slate-800 px-2 py-0.5 rounded">Upcoming</span>
                    </li>
                </ul>
            </section>

            <!-- RESULTS COLUMN -->
            <section class="space-y-4">
                <div class="border-b border-slate-900 pb-2">
                    <h2 class="text-xl font-black text-slate-100 uppercase tracking-tight">Results</h2>
                </div>
                <ul class="space-y-3">
                    <li>
                        <a href="results/{{ fixture_id }}" class="group stat-card border border-slate-800 p-4 rounded-xl flex items-center justify-between hover:border-brand-500 transition-all shadow-lg">
                            <span class="text-sm font-bold text-slate-300 group-hover:text-slate-100 transition-colors uppercase">Fixture Name</span>
                            <span class="text-xs text-brand-500 font-black group-hover:translate-x-1 transform transition-all flex items-center gap-1">
                                VIEW RESULTS <span>&rarr;</span>
                            </span>
                        </a>
                    </li>
                </ul>
            </section>
            
        </div>
    </main>

    <!-- INJECTED GLOBAL FOOTER CONTAINER -->
    <div id="global-footer"></div>

</body>
</html>
