<!DOCTYPE html>
<html lang="en-GB" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLCL Archive — Clubs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <script src="site-layout.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#0066cc' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; }
    </style>
</head>
<body class="text-slate-300 font-sans antialiased flex flex-col min-h-full">

    <!-- GLOBAL NAVIGATION CONTAINER -->
    <nav id="global-nav" class="border-b border-slate-900 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
        <!-- Injected automatically -->
    </nav>

    <script>
        fetch('components/nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('global-nav').innerHTML = data;
                window.dispatchEvent(new Event('navLoaded'));
            })
            .catch(err => console.error('Error loading navigation header:', err));
    </script>

    <!-- CLUBS HERO BANNER MATCHING ATHLETE PROFILE GRID -->
    <header class="relative w-full h-[240px] overflow-hidden border-b border-slate-900 bg-slate-950 flex items-end">
        
        <!-- Fine-grain CSS Dot Matrix Pattern -->
        <div class="absolute inset-0 opacity-[0.06] bg-[radial-gradient(#0066cc_1.5px,transparent_1.5px)] [background-size:20px_20px]"></div>
        
        <!-- Subtle deep blue ambient glow focused behind the text layout -->
        <div class="absolute left-12 -bottom-24 w-96 h-96 bg-brand-500/10 rounded-full blur-[100px] pointer-events-none select-none"></div>
        
        <!-- Bottom Smooth Fade Transition -->
        <div class="absolute inset-0 bg-gradient-to-t from-[#030712] via-transparent to-transparent"></div>

        <!-- Text Content Overlay Layer (Width-aligned to match the 1400px layout baseline grid) -->
        <div class="relative max-w-[1400px] w-full mx-auto px-4 pb-6 z-10 space-y-1.5">
            <span class="text-xs font-black tracking-widest text-brand-500 uppercase block">
                AFFILIATED TEAMS
            </span>
            
            <h1 class="text-3xl font-black text-slate-100 tracking-tight uppercase drop-shadow-md">
                League Clubs
            </h1>
            
            <div class="flex items-center space-x-3 text-[11px] font-mono font-bold text-slate-500 uppercase tracking-wider">
                <span>GWENT LEISURE CENTRE LEAGUE</span>
                <span class="text-slate-800">•</span>
                <span>HISTORICAL ROSTER ANALYSIS</span>
            </div>
        </div>
    </header>

    <!-- MAIN CARDS GRID CONTAINER -->
    <main class="max-w-[1400px] w-full mx-auto px-4 py-12 flex-grow">
        <section id="clubs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamically populated via calculation script -->
        </section>
    </main>

    <script>
document.addEventListener("DOMContentLoaded", () => {
    const allRecords = window.glclResults || [];

    // Master Club configuration array matching your dropdown names exactly
    const CLUBS = [
        "Caerleon Running Club",
        "Chepstow Harriers",
        "Fairwater Runners",
        "Griffithstown Harriers",
        "Islwyn RC",
        "Lliswerry Runners",
        "Parc Bryn Bach RC",
        "Pont-Y-Pwl & District Runners",
        "Spirit Of Monmouth RC"
    ];

    // Remapped filename targets to look for your existing banner images
    const clubImageMap = {
        "Caerleon Running Club": "caerleon-running-club.jpg",
        "Chepstow Harriers": "chepstow-harriers.jpg",
        "Fairwater Runners": "fairwater-runners.jpg",
        "Griffithstown Harriers": "griffithstown-harriers.jpg",
        "Islwyn RC": "islwyn-rc.jpg",
        "Lliswerry Runners": "lliswerry-runners.jpg",
        "Parc Bryn Bach RC": "parc-bryn-bach-rc.jpg",         // Updated to match club.html
        "Pont-Y-Pwl & District Runners": "pont-y-pwl-district-runners.jpg",
        "Spirit Of Monmouth RC": "spirit-of-monmouth-rc.jpg"   // Updated to match club.html
    };

    const gridContainer = document.getElementById('clubs-grid');
    gridContainer.innerHTML = '';

    CLUBS.forEach(clubName => {
        // Filter the global dataset to extract data points for this specific club
        const clubRecords = allRecords.filter(row => 
            row.club && row.club.toLowerCase() === clubName.toLowerCase()
        );

        // Aggregate basic telemetry
        const totalFinishes = clubRecords.length;
        const uniqueAthletes = new Set(clubRecords.map(row => row.name?.toUpperCase())).size;

        const clubUrl = `club.html?name=${encodeURIComponent(clubName)}`;
        
        // Pull the exact matching filename from our image map
        const imageName = clubImageMap[clubName] || "hero_placeholder.jpg";
        const imageSrc = `/assets/images/clubs/${imageName}`;

        const cardHtml = `
            <a href="${clubUrl}" class="group block relative bg-slate-900/40 backdrop-blur-sm border border-slate-800/80 hover:border-brand-500 rounded-2xl shadow-xl hover:shadow-[0_0_30px_-5px_rgba(0,102,204,0.3)] transition-all duration-300 hover:-translate-y-1.5 overflow-hidden h-64 flex flex-col justify-end">
                
                <!-- Background Image Layer -->
                <div class="absolute inset-0 z-0">
                    <img src="${imageSrc}" 
                         alt="${clubName} background" 
                         class="w-full h-full object-cover opacity-60 group-hover:opacity-85 group-hover:scale-105 transition-all duration-700 ease-in-out"
                         onerror="this.src='/assets/images/hero_placeholder.jpg'">
                    
                    <!-- Softened gradient overlay: allows much more of the photo to shine through -->
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950/90 via-slate-950/40 to-transparent"></div>
                    
                    <!-- Subtle blue brand accent overlay on hover -->
                    <div class="absolute inset-0 bg-brand-500/0 group-hover:bg-brand-500/5 transition-colors duration-500 z-0"></div>
                </div>

                <!-- Content Overlay Layer -->
                <div class="relative z-10 p-6 flex flex-col justify-end h-full">
                    
                    <!-- Top Badge -->
                    <div class="mb-auto transform translate-y-1 opacity-90 group-hover:translate-y-0 transition-all duration-300">
                        <span class="inline-flex items-center text-[10px] font-mono font-black bg-brand-500/10 text-brand-400 border border-brand-500/20 px-2.5 py-1 rounded-md uppercase tracking-widest backdrop-blur-sm shadow-sm">
                            Member Club
                        </span>
                    </div>
                    
                    <!-- Bottom Content (Title & Stats) -->
                    <div class="transform translate-y-1 group-hover:translate-y-0 transition-transform duration-300 ease-out">
                        <h2 class="text-2xl font-black text-white uppercase tracking-tight drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] mb-3 group-hover:text-brand-400 transition-colors">
                            ${clubName}
                        </h2>
                        
                        <div class="grid grid-cols-2 gap-4 pt-3 border-t border-slate-700/40 text-left">
                            <div>
                                <span class="block text-[9px] font-black text-slate-400 uppercase tracking-wider">Total Finishes</span>
                                <span class="text-xl font-black text-slate-100 font-mono mt-0.5 block drop-shadow-md">${totalFinishes}</span>
                            </div>
                            <div>
                                <span class="block text-[9px] font-black text-slate-400 uppercase tracking-wider">Active Rosters</span>
                                <span class="text-xl font-black text-slate-100 font-mono mt-0.5 block drop-shadow-md">${uniqueAthletes}</span>
                            </div>
                        </div>
                    </div>

                </div>
            </a>
        `;
        gridContainer.insertAdjacentHTML('beforeend', cardHtml);
    });
});
    </script>

    <!-- INJECTED GLOBAL FOOTER CONTAINER -->
    <div id="global-footer"></div>
</body>
</html>
