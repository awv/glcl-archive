<!DOCTYPE html>
<html lang="en-GB" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLCL Archive — Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <script src="site-layout.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#0066cc',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(3,7,18,0.3) 0%, rgba(3,7,18,1) 100%);
        }
    </style>
</head>
<body class="text-slate-300 font-sans antialiased flex flex-col min-h-full">

    <!-- GLOBAL NAVIGATION CONTAINER -->
    <nav id="global-nav" class="border-b border-slate-900 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
        <!-- Injected automatically via site-layout.js -->
    </nav>

    <!-- LARGER CINEMATIC HERO HERO BANNER -->
    <header class="relative h-[45vh] md:h-[55vh] flex items-center justify-center overflow-hidden border-b border-slate-900 w-full">
        <!-- Background Image -->
        <img src="assets/images/hero_placeholder.jpg" alt="Gwent League Cross Country Action" class="absolute inset-0 w-full h-full object-cover object-center transform scale-105 filter brightness-[0.35] contrast-125">
        <div class="absolute inset-0 hero-gradient"></div>
        
        <!-- Centered Header Content -->
        <div class="relative max-w-4xl mx-auto px-4 w-full z-10 text-center space-y-6">
            <h1 class="text-4xl md:text-6xl font-black text-slate-100 tracking-tight uppercase">
                GLCL Archive
            </h1>
            
            <!-- Centralized Prominent Search Field (Runner Search Focused) -->
            <div class="max-w-xl mx-auto relative">
                <div class="relative">
                    <input type="text" id="runner-search" placeholder="Search runner names..." autocomplete="off" 
                        class="w-full bg-slate-950/90 backdrop-blur border-2 border-slate-800 text-slate-100 placeholder-slate-500 rounded-xl px-5 py-4 text-base md:text-lg focus:outline-none focus:border-brand-500 font-medium transition-colors shadow-2xl">
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none hidden md:block">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
                
                <!-- Search Suggestions Dropdown -->
                <div id="autocomplete-results" class="hidden absolute left-0 right-0 mt-2 bg-slate-900 border border-slate-800 rounded-xl shadow-2xl z-50 max-h-64 overflow-y-auto divide-y divide-slate-950 text-left">
                    <!-- Dynamic search suggestions injected here -->
                </div>

                <!-- Database Era Disclaimer Text -->
                <p class="text-[10px] md:text-[11px] font-mono text-slate-500 uppercase tracking-widest mt-4">
                    Note: Database records currently cover campaigns from 2013 to 2026.
                </p>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT MODULE CONTAINER -->
    <main class="max-w-[1400px] mx-auto px-4 py-12 space-y-12 w-full flex-grow">
        
        <!-- FIXTURE BOARD TITLE -->
        <div class="border-b border-slate-900 pb-3 flex justify-between items-end">
            <div>
                <span class="text-[10px] font-mono font-bold tracking-widest text-brand-500 uppercase">Current Campaign</span>
                <h3 id="fixture-board-title" class="text-xl font-black text-slate-100 uppercase tracking-tight mt-1">Fixture Board</h3>
            </div>
            <span id="fixture-board-count" class="text-xs font-mono text-slate-500 font-bold">10 Round Series</span>
        </div>

        <!-- ROW 1: CROSS COUNTRY SERIES -->
        <section class="space-y-4">
            <h4 class="text-xs font-mono font-bold tracking-wider text-slate-400 uppercase">Cross Country Series (XC)</h4>
            <div id="xc-fixtures-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                <!-- Dynamically populated from config -->
            </div>
        </section>

        <!-- ROW 2: ROAD RUNNING SERIES -->
        <section class="space-y-4">
            <h4 class="text-xs font-mono font-bold tracking-wider text-slate-400 uppercase">Road Running Series (Road)</h4>
            <div id="road-fixtures-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                <!-- Dynamically populated from config -->
            </div>
        </section>

    </main>

    <!-- INJECTED GLOBAL FOOTER CONTAINER -->
    <div id="global-footer"></div>

    <!-- CONFIGURATION & RENDER ENGINE -->
    <script>
    // ==========================================
    // ⚙️ EASY CONFIGURATION BLOCK
    // ==========================================
    const ARCHIVE_CONFIG = {
        // 1. Set the active folder slug for links (must match folder naming)
        currentSeasonKey: "2025_2026", 
        currentSeasonLabel: "2025 / 2026",

        // 2. The 10 Fixtures of the season (5 XC, 5 Road).
        // - discipline: either "xc" or "road"
        // - live: true (results active) or false (pending state)
        // - cancelled: true (marks card as cancelled, overriding live/pending layouts)
        fixtures: [
            { name: "Glebelands",    date: "19 Oct 2025", discipline: "xc",   live: true,  cancelled: false },
            { name: "Rogerstone",    date: "23 Nov 2025", discipline: "xc", live: true,  cancelled: false },
            { name: "Oldfield Farm", date: "04 Jan 2026", discipline: "xc",   live: true,  cancelled: false },
            { name: "Parc Bryn Bach",date: "01 Feb 2026", discipline: "xc",   live: false, cancelled: true },
            { name: "Risca",         date: "08 Mar 2026", discipline: "xc",   live: true,  cancelled: false },
            { name: "Chepstow",      date: "05 May 2026", discipline: "road", live: true,  cancelled: false },
            { name: "Blaenavon",     date: "19 May 2026", discipline: "road",   live: true,  cancelled: false },
            { name: "Parc Penallta", date: "02 Jun 2026", discipline: "road", live: true,  cancelled: false },
            { name: "Cwmbran",       date: "30 Jun 2026", discipline: "road",   live: true,  cancelled: false },
            { name: "Parc Bryn Bach",date: "04 Aug 2026", discipline: "road", live: false, cancelled: false }
        ]
    };

    // ==========================================
    // 🖥️ ENGINE: RENDERS THE CONFIG TO THE PAGE
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
        const xcGrid = document.getElementById('xc-fixtures-grid');
        const roadGrid = document.getElementById('road-fixtures-grid');
        const boardTitle = document.getElementById('fixture-board-title');
        const boardCount = document.getElementById('fixture-board-count');

        if (xcGrid && roadGrid) {
            boardTitle.textContent = `${ARCHIVE_CONFIG.currentSeasonLabel} Fixture Board`;
            boardCount.textContent = `${ARCHIVE_CONFIG.fixtures.length} Round Series`;
            
            xcGrid.innerHTML = '';
            roadGrid.innerHTML = '';

            // Group fixtures by discipline to preserve chronological identity while splitting rows
            const xcFixtures = ARCHIVE_CONFIG.fixtures.filter(f => f.discipline.toLowerCase() === 'xc');
            const roadFixtures = ARCHIVE_CONFIG.fixtures.filter(f => f.discipline.toLowerCase() === 'road');

            // Helper function to render a single subset
            const renderRow = (fixturesList, container, disciplineName) => {
                fixturesList.forEach((fix, index) => {
                    const disciplineRaceIndex = index + 1;
                    const roundNumString = String(disciplineRaceIndex).padStart(2, '0');
                    const isXC = disciplineName === 'xc';
                    const discLabel = isXC ? 'XC' : 'ROAD';
                    
                    const card = document.createElement('div');
                    
                    // 1. CANCELLED STATE
                    if (fix.cancelled) {
                        card.className = "bg-slate-950/40 border border-red-950/40 rounded-xl p-4 flex flex-col justify-between space-y-4 opacity-50";
                        card.innerHTML = `
                            <div class="space-y-1.5">
                                <div class="flex justify-between items-center">
                                    <span class="text-[9px] font-mono font-bold text-slate-600 uppercase tracking-wider">Fixture ${roundNumString}</span>
                                    <span class="text-[9px] font-mono font-bold bg-red-500/10 text-red-400 px-2 py-0.5 rounded uppercase tracking-wider">Cancelled</span>
                                </div>
                                <h4 class="text-sm font-black text-slate-400 line-through uppercase tracking-tight">${fix.name}</h4>
                                <p class="text-[11px] font-mono text-slate-600">${fix.date}</p>
                            </div>
                            <div class="pt-2 border-t border-slate-900">
                                <span class="block text-center text-[10px] font-mono font-bold text-red-500/60 py-1.5 bg-red-950/5 rounded">Race Cancelled</span>
                            </div>
                        `;
                    }
                    // 2. LIVE RESULTS STATE (race parameter sequential to row index)
                    else if (fix.live) {
                        const badgeStyle = isXC 
                            ? "bg-brand-500/10 text-brand-400" 
                            : "bg-amber-500/10 text-amber-400";
                            
                        const btnStyle = isXC
                            ? "bg-brand-500/10 hover:bg-brand-500 text-brand-400 hover:text-white"
                            : "bg-amber-500/10 hover:bg-amber-500 text-amber-400 hover:text-slate-950";

                        card.className = "bg-slate-950 border border-slate-800 rounded-xl p-4 flex flex-col justify-between space-y-4 hover:border-brand-500/50 transition-all shadow-lg";
                        card.innerHTML = `
                            <div class="space-y-1.5">
                                <div class="flex justify-between items-center">
                                    <span class="text-[9px] font-mono font-bold text-slate-500 uppercase tracking-wider">Fixture ${roundNumString}</span>
                                    <span class="text-[9px] font-mono font-bold px-2 py-0.5 rounded uppercase tracking-wider ${badgeStyle}">${discLabel}</span>
                                </div>
                                <h4 class="text-sm font-black text-slate-200 uppercase tracking-tight">${fix.name}</h4>
                                <p class="text-[11px] font-mono text-slate-400">${fix.date}</p>
                            </div>
                            <div class="pt-2 border-t border-slate-900/60">
                                <a href="results.html?season=${ARCHIVE_CONFIG.currentSeasonKey}&discipline=${disciplineName}&race=${disciplineRaceIndex}" 
                                   class="block text-center text-[10px] font-mono font-bold py-2 rounded transition-all ${btnStyle}">
                                   View Results
                                </a>
                            </div>
                        `;
                    } 
                    // 3. UPCOMING / PENDING STATE
                    else {
                        card.className = "bg-slate-950/40 border border-slate-900 rounded-xl p-4 flex flex-col justify-between space-y-4 opacity-60";
                        card.innerHTML = `
                            <div class="space-y-1.5">
                                <div class="flex justify-between items-center">
                                    <span class="text-[9px] font-mono font-bold text-slate-600 uppercase tracking-wider">Fixture ${roundNumString}</span>
                                    <span class="text-[9px] font-mono font-bold bg-slate-900 text-slate-500 px-2 py-0.5 rounded uppercase tracking-wider">${discLabel}</span>
                                </div>
                                <h4 class="text-sm font-black text-slate-400 uppercase tracking-tight">${fix.name}</h4>
                                <p class="text-[11px] font-mono text-slate-600">${fix.date}</p>
                            </div>
                            <div class="pt-2 border-t border-slate-900">
                                <span class="block text-center text-[10px] font-mono font-bold text-slate-600 py-1.5 bg-slate-900/20 rounded">Awaiting Fixture</span>
                            </div>
                        `;
                    }
                    container.appendChild(card);
                });
            };

            // Render both lists into their respective rows cleanly
            renderRow(xcFixtures, xcGrid, 'xc');
            renderRow(roadFixtures, roadGrid, 'road');
        }

        // AUTOCOMPLETE SEARCH SYSTEM (Runner names only)
        const searchInput = document.getElementById('runner-search');
        const resultsContainer = document.getElementById('autocomplete-results');
        let uniqueRunners = [];

        if (typeof window.glclResults !== 'undefined' && Array.isArray(window.glclResults)) {
            const runnersMap = new Map();
            window.glclResults.forEach(item => {
                if (item && item.name) {
                    const standardizedName = item.name.trim();
                    if (!runnersMap.has(standardizedName)) {
                        runnersMap.set(standardizedName, item.club || 'Independent');
                    }
                }
            });
            uniqueRunners = Array.from(runnersMap).map(([name, club]) => ({ name, club }));
        }

        const routeToAthlete = (name) => {
            window.location.href = `athlete.html?name=${encodeURIComponent(name)}`;
        };

        if (searchInput && resultsContainer) {
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                resultsContainer.innerHTML = '';

                if (query.length < 2) {
                    resultsContainer.classList.add('hidden');
                    return;
                }

                // Filter explicitly against runner names
                const filtered = uniqueRunners.filter(runner => 
                    runner.name.toLowerCase().includes(query)
                ).slice(0, 10);

                if (filtered.length === 0) {
                    resultsContainer.classList.add('hidden');
                    return;
                }

                filtered.forEach(runner => {
                    const item = document.createElement('div');
                    item.className = 'px-4 py-3 hover:bg-slate-800/60 cursor-pointer flex justify-between items-center transition-colors';
                    item.innerHTML = `
                        <span class="text-sm font-bold text-slate-200">${runner.name}</span>
                        <span class="text-[10px] font-mono tracking-wider text-slate-500 uppercase">${runner.club}</span>
                    `;
                    
                    item.addEventListener('click', () => {
                        routeToAthlete(runner.name);
                    });
                    
                    resultsContainer.appendChild(item);
                });

                resultsContainer.classList.remove('hidden');
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    if (query.length > 0) {
                        const firstMatch = uniqueRunners.find(runner => 
                            runner.name.toLowerCase().includes(query.toLowerCase())
                        );
                        if (firstMatch) {
                            routeToAthlete(firstMatch.name);
                        }
                    }
                }
            });

            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !resultsContainer.contains(e.target)) {
                    resultsContainer.classList.add('hidden');
                }
            });
        }
    });
    </script>
</body>
</html>
