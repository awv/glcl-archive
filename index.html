<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture Results — GLCL Archive</title>
    
    <!-- Tailwind Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- External Sleek Stylesheet -->
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <!-- Core Datasets & Shared Layout Modules -->
    <script src="data.js" defer></script>
    <script src="site-layout.js" defer></script>
</head>
<body class="text-slate-300 font-sans antialiased bg-slate-950">

    <!-- Dynamically Injected Layout Header -->
    <div id="global-header"></div>

    <main class="max-w-[1400px] mx-auto px-4 mt-8">
        <!-- Fixture Headline Header Info -->
        <div class="stat-card p-6 rounded-xl shadow-xl mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <span class="inline-block text-xs font-black tracking-widest text-white uppercase px-2.5 py-1 rounded-md mb-2" style="background-color: #1F6C93;">
                    Cross Country • Season 2024/2025
                </span>
                <h2 id="fixture-title" class="text-2xl font-black text-slate-100 tracking-tight uppercase">
                    Fixture 1: Glebelands
                </h2>
                <p class="text-xs sm:text-sm text-slate-400 font-medium mt-0.5">
                    Course Distance: 4.16 Miles | Run on 19 October 2024
                </p>
            </div>
            <div class="text-left md:text-right">
                <span id="runner-count" class="text-3xl font-black text-slate-100 block tracking-tight">0</span>
                <span class="text-xs font-mono text-slate-400 uppercase tracking-wider">Runners Parsed</span>
            </div>
        </div>

        <!-- Sleek Responsive Data Table Card -->
        <div class="leaderboard-box rounded-xl shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-900/80 border-b border-slate-800 text-xs font-black tracking-wider text-slate-400 uppercase">
                            <th class="py-4 px-5 text-center w-16">Pos</th>
                            <th class="py-4 px-4 w-20">Bib</th>
                            <th class="py-4 px-4">Name</th>
                            <th class="py-4 px-4 text-center w-16">Sex</th>
                            <th class="py-4 px-4 text-center w-20">Category</th>
                            <th class="py-4 px-4">Club</th>
                            <th class="py-4 px-4 text-center w-24">Gen Pos</th>
                            <th class="py-4 px-4 text-center w-24">Cat Pos</th>
                            <th class="py-4 px-5 text-right w-28">Time</th>
                        </tr>
                    </thead>
                    <tbody id="results-rows" class="divide-y divide-slate-800/40 text-sm font-medium text-slate-300">
                        <!-- Runner row components inject here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Dynamically Injected Layout Footer -->
    <div id="global-footer"></div>

    <!-- Isolated Controller Script Module -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const resultsContainer = document.getElementById('results-rows');
            const countBadge = document.getElementById('runner-count');
            
            const records = window.glclResults || [];
            countBadge.textContent = records.length;

            // Generate clean row components dynamically
            records.forEach(runner => {
                const rowHtml = `
                    <tr class="hover:bg-slate-900/40 transition-colors">
                        <td class="py-3.5 px-5 text-center font-mono font-bold text-slate-400">${runner.pos}</td>
                        <td class="py-3.5 px-4 font-mono text-xs text-slate-500">${runner.bib}</td>
                        <td class="py-3.5 px-4 font-bold text-slate-100">${runner.name}</td>
                        <td class="py-3.5 px-4 text-center font-semibold text-slate-400">${runner.sex}</td>
                        <td class="py-3.5 px-4 text-center font-mono text-xs bg-slate-900/30 text-slate-400 rounded">${runner.age_cat}</td>
                        <td class="py-3.5 px-4 text-slate-300 font-semibold">${runner.club}</td>
                        <td class="py-3.5 px-4 text-center font-mono text-slate-400">${runner.gender_pos}</td>
                        <td class="py-3.5 px-4 text-center font-mono text-slate-400">${runner.cat_pos}</td>
                        <td class="py-3.5 px-5 text-right font-mono font-bold text-slate-100">${runner.time}</td>
                    </tr>
                `;
                resultsContainer.insertAdjacentHTML('beforeend', rowHtml);
            });
        });
    </script>
</body>
</html>
