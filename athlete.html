<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLCL Archive — Athlete Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <script src="site-layout.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#0066cc' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; }
    </style>
</head>
<body class="text-slate-300 font-sans antialiased">

    <!-- GLOBAL NAVIGATION CONTAINER -->
    <nav id="global-nav" class="border-b border-slate-900 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
        <!-- Injected automatically -->
    </nav>

    <script>
        fetch('components/nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('global-nav').innerHTML = data;
                window.dispatchEvent(new Event('navLoaded'));
            })
            .catch(err => console.error('Error loading navigation header:', err));
    </script>

    <!-- ATHLETE HERO BANNER WITH PURE CSS MESH PATTERN -->
    <header class="relative w-full h-[220px] overflow-hidden border-b border-slate-900 bg-slate-950 flex items-end">
        
        <!-- Fine-grain CSS Dot Matrix Pattern -->
        <div class="absolute inset-0 opacity-[0.06] bg-[radial-gradient(#0066cc_1.5px,transparent_1.5px)] [background-size:20px_20px]"></div>
        
        <!-- Subtle deep blue ambient glow focused behind the text layout -->
        <div class="absolute left-12 -bottom-24 w-96 h-96 bg-brand-500/10 rounded-full blur-[100px] pointer-events-none select-none"></div>
        
        <!-- Bottom Smooth Fade Transition -->
        <div class="absolute inset-0 bg-gradient-to-t from-[#030712] via-transparent to-transparent"></div>

        <!-- Text Content Overlay Layer -->
        <div class="relative max-w-7xl w-full mx-auto px-6 pb-6 z-10 space-y-1.5">
            
            <span id="athlete-club" class="text-xs font-black tracking-widest text-brand-500 uppercase block">
                <!-- Injected by script -->
            </span>
            
            <!-- Flex Wrapper to Keep Name and Badges Cleanly Aligned Inline -->
            <div class="flex flex-wrap items-center gap-3">
                <h1 id="athlete-name" class="text-3xl font-black text-slate-100 tracking-tight uppercase drop-shadow-md">
                    <!-- Injected by script -->
                </h1>
                <div id="athlete-badges" class="flex flex-wrap gap-1.5"></div>
            </div>
            
            <!-- Secondary Meta Target -->
            <div class="flex items-center space-x-3 text-[11px] font-mono font-bold text-slate-500 uppercase tracking-wider">
                <span id="athlete-gender">GENDER: —</span>
                <span class="text-slate-800">•</span>
                <span id="athlete-age-cat">AGE DIVISION PROFILE</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 space-y-12">
        
        <!-- MACRO OVERVIEW METRICS GRID -->
        <section class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
            <div class="bg-slate-950 border border-slate-900 p-4 rounded-xl shadow-md">
                <span class="block text-[10px] font-black text-slate-500 uppercase tracking-wider">XC Races</span>
                <span id="stat-xc-count" class="text-2xl font-black text-slate-200 block mt-1">0</span>
            </div>
            <div class="bg-slate-950 border border-slate-900 p-4 rounded-xl shadow-md">
                <span class="block text-[10px] font-black text-slate-500 uppercase tracking-wider">Road Races</span>
                <span id="stat-road-count" class="text-2xl font-black text-slate-200 block mt-1">0</span>
            </div>
            <div class="bg-slate-950 border border-slate-900 p-4 rounded-xl shadow-md">
                <span class="block text-[10px] font-black text-slate-500 uppercase tracking-wider">Unique Venues</span>
                <span id="stat-venues" class="text-2xl font-black text-slate-200 block mt-1">0</span>
            </div>
            <div class="bg-slate-950 border border-slate-900 p-4 rounded-xl shadow-md">
                <span class="block text-[10px] font-black text-slate-500 uppercase tracking-wider">Category Wins</span>
                <span id="stat-cat-wins" class="text-2xl font-black text-amber-400 block mt-1">0</span>
            </div>
            <div class="bg-slate-950 border border-slate-900 p-4 rounded-xl shadow-md">
                <span class="block text-[10px] font-black text-slate-500 tracking-wider uppercase">Best XC Pos</span>
                <span id="stat-best-xc" class="text-2xl font-black text-sky-400 block mt-1">-</span>
            </div>
            <div class="bg-slate-950 border border-slate-900 p-4 rounded-xl shadow-md">
                <span class="block text-[10px] font-black text-slate-500 tracking-wider uppercase">Best Road Pos</span>
                <span id="stat-best-road" class="text-2xl font-black text-amber-500 block mt-1">-</span>
            </div>
        </section>

        <!-- CHRONOLOGICAL CAREER TIMELINE -->
        <section class="space-y-4">
            <h2 class="text-xs font-black tracking-widest text-slate-500 uppercase">Complete Race History</h2>
            <div class="border border-slate-900 bg-slate-950 rounded-xl overflow-hidden shadow-xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs">
                        <thead>
                            <tr class="border-b border-slate-900 font-black uppercase tracking-wider text-slate-500 bg-slate-900/40 text-[10px]">
                                <th class="py-3 px-4">Season</th>
                                <th class="py-3 px-4 w-24">Series</th>
                                <th class="py-3 px-4">Fixture / Venue</th>
                                <th class="py-3 px-4">Date</th>
                                <th class="py-3 px-4 text-center w-24">Overall Pos</th>
                                <th class="py-3 px-4 text-center w-24">Cat Pos</th>
                                <th class="py-3 px-4 text-center w-24">Gender Pos</th>
                                <th class="py-3 px-4 text-right pr-6 w-24">Time</th>
                            </tr>
                        </thead>
                        <tbody id="history-rows" class="divide-y divide-slate-900/40 text-slate-300">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- CONTROLLER SCRIPT -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetAthlete = urlParams.get('name');

            if (!targetAthlete) {
                document.getElementById('athlete-name').textContent = "No Athlete Specified";
                return;
            }

            const allRecords = window.glclResults || [];
            
            const history = allRecords.filter(row => 
                row.name && row.name.toLowerCase() === targetAthlete.toLowerCase() && row.pos > 0
            ).sort((a, b) => {
                if (a.season !== b.season) return b.season.localeCompare(a.season);
                return b.race_number - a.race_number;
            });

            if (history.length === 0) {
                document.getElementById('athlete-name').textContent = "Athlete Not Found";
                return;
            }

            // Identify Base Info from most recent finish row
            const meta = history[0];
            document.getElementById('athlete-name').textContent = meta.name;
            document.getElementById('athlete-club').textContent = meta.club || "Unattached";
            document.getElementById('athlete-gender').textContent = `Gender: ${meta.sex === 'M' ? 'Male' : 'Female'}`;
            document.getElementById('athlete-age-cat').textContent = meta.age_cat ? `Category: ${meta.age_cat.toUpperCase()}` : "Age Division Profile";

            // Aggregation Computations
            let xcCount = 0;
            let roadCount = 0;
            let catWins = 0;
            let overallWins = 0;
            let bestXcPos = Infinity;
            let bestRoadPos = Infinity;
            const venuesSet = new Set();

            history.forEach(row => {
                const disc = (row.discipline || '').toLowerCase();
                venuesSet.add(row.venue);

                if (disc === 'xc') {
                    xcCount++;
                    if (row.pos < bestXcPos) bestXcPos = row.pos;
                } else if (disc === 'road') {
                    roadCount++;
                    if (row.pos < bestRoadPos) bestRoadPos = row.pos;
                }

                if (parseInt(row.cat_pos, 10) === 1) {
                    catWins++;
                }

                if (parseInt(row.gender_pos, 10) === 1) {
                    overallWins++;
                }
            });

            // Update Metric Text Blocks
            document.getElementById('stat-xc-count').textContent = xcCount;
            document.getElementById('stat-road-count').textContent = roadCount;
            document.getElementById('stat-venues').textContent = venuesSet.size;
            document.getElementById('stat-cat-wins').textContent = catWins;
            document.getElementById('stat-best-xc').textContent = bestXcPos === Infinity ? '-' : `Pos ${bestXcPos}`;
            document.getElementById('stat-best-road').textContent = bestRoadPos === Infinity ? '-' : `Pos ${bestRoadPos}`;

            // Render History Table Rows
            const tableBody = document.getElementById('history-rows');
            tableBody.innerHTML = '';

            history.forEach(row => {
                const isXc = (row.discipline || '').toLowerCase() === 'xc';
                const typeBadge = isXc 
                    ? '<span class="text-[10px] font-mono font-bold bg-brand-500/10 text-brand-400 px-2 py-0.5 rounded">XC</span>' 
                    : '<span class="text-[10px] font-mono font-bold bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded">ROAD</span>';
                
                let dateStr = row.date || '';
                if (dateStr.includes('-')) {
                    const parts = dateStr.split('-');
                    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                    if (parts.length === 3) dateStr = `${parseInt(parts[2], 10)} ${months[parseInt(parts[1], 10) - 1]} ${parts[0]}`;
                }

                const catPosNum = parseInt(row.cat_pos, 10);
                let catPosHtml = `<span class="text-slate-400">Pos ${row.cat_pos}</span>`;
                if (catPosNum === 1) catPosHtml = '<span class="text-amber-400 font-bold">🥇 Pos 1</span>';
                if (catPosNum === 2) catPosHtml = '<span class="text-slate-300 font-bold">🥈 Pos 2</span>';
                if (catPosNum === 3) catPosHtml = '<span class="text-amber-600 font-bold">🥉 Pos 3</span>';

                const paramSeason = row.season.replace('/', '_');
                const resultsUrl = `results.html?season=${paramSeason}&discipline=${row.discipline.toLowerCase()}&race=${row.race_number}`;

                const trHtml = `
                    <tr class="hover:bg-slate-900/10 transition-colors">
                        <td class="py-3 px-4 font-mono text-slate-400">${row.season}</td>
                        <td class="py-3 px-4">${typeBadge}</td>
                        <td class="py-3 px-4">
                            <a href="${resultsUrl}" class="font-bold text-slate-200 uppercase tracking-tight hover:text-brand-500 transition-colors">
                                Fixture ${row.race_number} — ${row.venue}
                            </a>
                        </td>
                        <td class="py-3 px-4 text-slate-500 font-medium">${dateStr}</td>
                        <td class="py-3 px-4 text-center font-mono text-slate-400 font-bold">Pos ${row.pos}</td>
                        <td class="py-3 px-4 text-center font-mono">${catPosHtml}</td>
                        <td class="py-3 px-4 text-center font-mono text-slate-400">Pos ${row.gender_pos}</td>
                        <td class="py-3 px-4 text-right font-mono font-bold pr-6 text-brand-500">${row.time}</td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', trHtml);
            });

            // WIRE DYNAMIC MILESTONE BADGES UP TO COMPUTED DATA
            const badgeContainer = document.getElementById('athlete-badges');
            if (badgeContainer) {
                badgeContainer.innerHTML = '';
                
                // 1. Outright Race Winner Badge (Highest Priority)
                if (overallWins > 0) {
                    badgeContainer.insertAdjacentHTML('beforeend', `
                        <span class="inline-flex items-center text-[10px] font-mono font-black bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2 py-0.5 rounded uppercase tracking-wider animate-pulse">
                            👑 Race Winner (${overallWins})
                        </span>
                    `);
                }
                
                // 2. Category Wins Logic
                if (catWins > 0) {
                    if (catWins >= 5) {
                        badgeContainer.insertAdjacentHTML('beforeend', `
                            <span class="inline-flex items-center text-[10px] font-mono font-black bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded uppercase tracking-wider">
                                🥇 Cat Dominator (${catWins})
                            </span>
                        `);
                    } else {
                        badgeContainer.insertAdjacentHTML('beforeend', `
                            <span class="inline-flex items-center text-[10px] font-mono font-black bg-yellow-600/10 text-yellow-500 border border-yellow-600/20 px-2 py-0.5 rounded uppercase tracking-wider">
                                🏅 Cat Winner
                            </span>
                        `);
                    }
                }

                // 3. Loyalty Aggregation
                const totalRaces = xcCount + roadCount;
                if (totalRaces >= 10) {
                    badgeContainer.insertAdjacentHTML('beforeend', `
                        <span class="inline-flex items-center text-[10px] font-mono font-black bg-brand-500/10 text-brand-400 border border-brand-500/20 px-2 py-0.5 rounded uppercase tracking-wider">
                            🛡️ League Veteran
                        </span>
                    `);
                }

                // 4. Peak Finisher Position Aggregation
                const bestOverallPos = Math.min(bestXcPos, bestRoadPos);
                if (bestOverallPos > 0 && bestOverallPos <= 10) {
                    badgeContainer.insertAdjacentHTML('beforeend', `
                        <span class="inline-flex items-center text-[10px] font-mono font-black bg-sky-500/10 text-sky-400 border border-sky-500/20 px-2 py-0.5 rounded uppercase tracking-wider">
                            ⚡ Top 10 Finisher
                        </span>
                    `);
                }
            }
        });
    </script>
    <div id="global-footer"></div>
</body>
</html>
